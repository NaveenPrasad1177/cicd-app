apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-app
  template:
    metadata:
      labels:
        app: cicd-app
    spec:
      containers:
        - name: cicd-app
          image: 879381245825.dkr.ecr.eu-west-1.amazonaws.com/cicd-app:latest
          ports:
            - containerPort: 8080